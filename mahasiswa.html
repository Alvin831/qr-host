<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Presensi Mahasiswa</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
    font-family:Arial;
    text-align:center;
    padding:30px;
    background:linear-gradient(135deg,#fa709a,#fee140);
}
.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
}
input,button{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
}
button{
    background:#fa709a;
    color:white;
    font-weight:bold;
    cursor:pointer;
}
#reader{
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h2>Scan QR Presensi</h2>

<input type="text" id="baseUrl"
value="https://script.google.com/macros/s/AKfycbwzUheSSP7Ht8vf4vLjOhqP7tFTQ-Q5UL8KvDnTrQ9JEYhQ8kgrvLH7s82wNeiNJZ8/exec">

<input type="text" id="userId" placeholder="NIM">
<input type="text" id="courseId" placeholder="Course ID" value="CLOUD101">
<input type="text" id="sessionId" placeholder="Session ID" value="P1">

<div id="reader"></div>

<p id="status"></p>

</div>

<script>

let scannedToken="";

function onScanSuccess(decodedText){
    scannedToken=decodedText;
    document.getElementById("status").innerHTML="QR terdeteksi. Memproses...";
    checkIn();
}

new Html5QrcodeScanner("reader",{fps:10,qrbox:250})
.render(onScanSuccess);

async function checkIn(){

    const baseUrl=document.getElementById("baseUrl").value.trim();
    const userId=document.getElementById("userId").value.trim();
    const courseId=document.getElementById("courseId").value.trim();
    const sessionId=document.getElementById("sessionId").value.trim();

    if(!userId){
        document.getElementById("status").innerHTML="Isi NIM dulu";
        return;
    }

    const formData=new URLSearchParams();
    formData.append("path","presence/checkin");
    formData.append("user_id",userId);
    formData.append("device_id","WEB-"+Date.now());
    formData.append("course_id",courseId);
    formData.append("session_id",sessionId);
    formData.append("qr_token",scannedToken);

    const response=await fetch(baseUrl,{
        method:"POST",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },
        body:formData.toString()
    });

    const data=await response.json();

    if(data.ok){
        document.getElementById("status").innerHTML=
        "✅ Berhasil! Presence ID: "+data.data.presence_id;
    }else{
        document.getElementById("status").innerHTML=
        "❌ "+data.error;
    }
}
</script>

</body>
</html>
