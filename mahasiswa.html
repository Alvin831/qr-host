<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presensi Mahasiswa - QR Scanner</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
font-size:16px;
margin-top:10px;
}

#scannerContainer{
display:none;
margin-top:20px;
}

#scanner{
width:100%;
}

#scanner video{
width:100%;
height:100%;
object-fit:cover;
}

.alert{
padding:15px;
margin-top:15px;
border-radius:10px;
}

.alert-success{
background:#4CAF50;
color:white;
}

.alert-error{
background:#f44336;
color:white;
}

.alert-info{
background:#2196F3;
color:white;
}

.status-box{
display:none;
background:#e8f5e9;
padding:15px;
margin-top:20px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h3>Konfigurasi</h3>

<label>Base URL Backend</label>
<input type="text" id="baseUrl" placeholder="https://script.google.com/macros/s/.../exec">

<label>NIM</label>
<input type="text" id="userId">

<label>Mata Kuliah</label>
<input type="text" id="courseId" value="CLOUD-COMPUTING-101">

<label>Sesi</label>
<input type="text" id="sessionId" value="PERTEMUAN-01">

</div>

<div class="card">

<h3>Scan QR</h3>

<button onclick="startScanner()" id="btnStartScan">Buka Kamera</button>
<button onclick="stopScanner()" id="btnStopScan" style="display:none;background:red">Tutup Kamera</button>

<div id="scannerContainer">
<div id="scanner"></div>
</div>

<input type="text" id="manualToken" placeholder="Token QR">

<button onclick="checkInManual()">Check In</button>

<div id="alertBox"></div>
<div id="statusBox" class="status-box"></div>

</div>

</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>

let html5QrCode=null
let isScanning=false
let alreadyScanned=false

window.onload=function(){

const savedUrl=localStorage.getItem('baseUrl')
const savedUserId=localStorage.getItem('userId')

if(savedUrl)document.getElementById('baseUrl').value=savedUrl
if(savedUserId)document.getElementById('userId').value=savedUserId

}

function showAlert(message,type='info'){

const alertBox=document.getElementById('alertBox')

alertBox.className='alert alert-'+type
alertBox.innerHTML=message
alertBox.style.display='block'

}

async function startScanner(){

const scannerContainer=document.getElementById('scannerContainer')
const btnStart=document.getElementById('btnStartScan')
const btnStop=document.getElementById('btnStopScan')

try{

alreadyScanned=false
isScanning=true

html5QrCode=new Html5Qrcode("scanner")

await html5QrCode.start(
{ facingMode:{ exact:"environment"} },
{
fps:10,
qrbox:{width:250,height:250}
},
onScanSuccess
)

scannerContainer.style.display='block'
btnStart.style.display='none'
btnStop.style.display='block'

showAlert('Kamera aktif. Arahkan ke QR Code','info')

}catch(err){

showAlert('Gagal membuka kamera '+err,'error')

}

}

async function stopScanner(){

try{

if(html5QrCode && isScanning){

await html5QrCode.stop()
await html5QrCode.clear()

}

}catch(e){}

html5QrCode=null
isScanning=false

document.getElementById('scannerContainer').style.display='none'
document.getElementById('btnStartScan').style.display='block'
document.getElementById('btnStopScan').style.display='none'

}

function onScanSuccess(decodedText){

if(alreadyScanned)return

alreadyScanned=true
isScanning=false

document.getElementById('manualToken').value=decodedText

showAlert('QR terdeteksi, memproses checkin','success')

stopScanner()

setTimeout(()=>{
checkInManual()
},800)

}

async function checkInManual(){

let baseUrl=document.getElementById('baseUrl').value.trim()
const userId=document.getElementById('userId').value.trim()
const courseId=document.getElementById('courseId').value.trim()
const sessionId=document.getElementById('sessionId').value.trim()
const token=document.getElementById('manualToken').value.trim()

const statusBox=document.getElementById('statusBox')

if(!baseUrl){
showAlert('Base URL kosong','error')
return
}

if(!userId||!courseId||!sessionId||!token){
showAlert('Data belum lengkap','error')
return
}

baseUrl=baseUrl.replace(/\/+$/,'')

if(!baseUrl.endsWith('/exec')){
baseUrl+='/exec'
}

localStorage.setItem('baseUrl',baseUrl)
localStorage.setItem('userId',userId)

showAlert('Mengirim data...','info')

try{

const formData=new URLSearchParams()

formData.append('path','presence/checkin')
formData.append('user_id',userId)
formData.append('device_id','WEB-'+Date.now())
formData.append('course_id',courseId)
formData.append('session_id',sessionId)
formData.append('qr_token',token)
formData.append('ts',new Date().toISOString())

const response=await fetch(baseUrl,{
method:'POST',
headers:{
'Content-Type':'application/x-www-form-urlencoded'
},
body:formData.toString()
})

const data=await response.json()

if(data.ok){

showAlert('Checkin berhasil','success')

statusBox.style.display='block'

statusBox.innerHTML=`
<b>Presensi Berhasil</b><br><br>
NIM : ${userId}<br>
Course : ${courseId}<br>
Session : ${sessionId}<br>
Time : ${new Date().toLocaleString()}
`

document.getElementById('manualToken').value=''

}else{

throw new Error(data.error)

}

}catch(error){

showAlert('Error '+error.message,'error')

}

}

</script>

</body>
</html>
